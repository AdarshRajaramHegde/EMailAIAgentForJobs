name: "🤖 AI Job Application Agent"

# Runs the agent once every night at 2 AM UTC

on:
  schedule:
    # Runs thrice a day: 2:00 AM, 7:00 AM, and 6:00 PM UTC (Dublin local time shifts by 1h in summer)
    - cron: "0 2,7,18 * * *"

  # Trigger on push to main branch
  push:
    branches:
      - main

  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "pipeline"
        type: choice
        options:
          - discover
          - pipeline
          - report
          - full

jobs:
  job-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: "📥 Checkout code"
        uses: actions/checkout@v4

      - name: "🐍 Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: "📦 Install dependencies"
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: "📂 Restore data cache"
        uses: actions/cache@v4
        with:
          path: |
            data/
          key: jobagent-data-${{ github.run_number }}
          restore-keys: |
            jobagent-data-

      - name: "🔑 Inject LinkedIn Session"
        if: env.LINKEDIN_SESSION_JSON != ''
        env:
          LINKEDIN_SESSION_JSON: ${{ secrets.LINKEDIN_SESSION_JSON }}
        run: |
          mkdir -p data/sessions
          echo "$LINKEDIN_SESSION_JSON" > data/sessions/linkedin.json
          echo "LinkedIn session injected successfully"

      - name: "🔍 Run Job Discovery & Pipeline"
        if: github.event_name == 'schedule' || github.event_name == 'push' || github.event.inputs.mode == 'full' || github.event.inputs.mode == 'discover' || github.event.inputs.mode == 'pipeline'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
          LINKEDIN_EMAIL: ${{ secrets.LINKEDIN_EMAIL }}
          LINKEDIN_PASSWORD: ${{ secrets.LINKEDIN_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          WORKDAY_EMAIL: ${{ secrets.WORKDAY_EMAIL }}
          WORKDAY_PASSWORD: ${{ secrets.WORKDAY_PASSWORD }}
          DATABASE_URL: "sqlite:///data/jobagent.db"
          DRY_RUN: ${{ secrets.DRY_RUN || 'true' }}
        run: |
          python main.py --pipeline

      - name: "📧 Send Daily Summary"
        if: github.event_name == 'schedule' || github.event_name == 'push' || github.event.inputs.mode == 'report'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DATABASE_URL: "sqlite:///data/jobagent.db"
        run: |
          python main.py --report

      - name: "📊 Send Weekly Report"
        if: github.event_name == 'schedule' || github.event.inputs.mode == 'report'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
          DATABASE_URL: "sqlite:///data/jobagent.db"
        run: |
          # Only run weekly report on Sundays (7) or if manually requested
          if [ "$(date +%u)" = "7" ] || [ "${{ github.event.inputs.mode }}" == "report" ]; then
            python -c "
            import sys; sys.path.insert(0, '.')
            from database.db import init_db
            init_db()
            from notifications.email_notifier import EmailNotifier
            EmailNotifier().send_weekly_report()
            "
          else
            echo "Skipping weekly report: Not Sunday (Day $(date +%u))"
          fi

      - name: "💾 Save data artifacts"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-data-${{ github.run_number }}
          path: data/
          retention-days: 30

  # Auto-restart: if the job fails, retry once after 5 minutes
  retry-on-failure:
    runs-on: ubuntu-latest
    needs: job-agent
    if: failure()
    steps:
      - name: "⏳ Wait before retry"
        run: sleep 300

      - name: "🔄 Trigger retry"
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'job-agent.yml',
              ref: 'main',
              inputs: { mode: 'full' }
            });
